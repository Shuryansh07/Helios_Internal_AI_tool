# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploy: push this repo to GitHub, then in Render: New + > Blueprint > pick the repo.
# Render reads this file and creates the service. Secret env vars (sync: false) are
# prompted for in the dashboard on first deploy — they are NOT stored in the repo.
services:
  - type: web
    name: project-proposal-automation
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    # 1 worker: the OTP store and WorkDrive index live in process memory, so a single
    # worker keeps them consistent. --threads 4 gives concurrency; --timeout 180 keeps
    # gunicorn from killing slow LLM / embedding / transcription requests (default is 30s).
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 180
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.6"
      # Stable random session-signing key, generated once by Render and kept across
      # deploys — so logged-in sessions survive restarts.
      - key: FLASK_SECRET_KEY
        generateValue: true

      # ---- Required: set these in the Render dashboard ----
      - key: OPENAI_API_KEY
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_INITIAL_PASSWORD
        sync: false
      - key: COMPANY_NAME
        sync: false

      # ---- Model / tuning config (non-secret; safe to commit) ----
      - key: OPENAI_MODEL
        value: gpt-4o
      - key: OPENAI_DASHBOARD_MODEL
        value: gpt-4o-mini
      - key: OPENAI_IMAGE_MODEL          # flowchart "AI Image" render mode
        value: gpt-image-2
      - key: TRANSCRIPT_CHAR_LIMIT
        value: "40000"
      - key: PROPOSAL_REQUIREMENT_CHAR_LIMIT
        value: "24000"
      - key: PROPOSAL_REFERENCES_CHAR_LIMIT
        value: "16000"
      - key: GEMINI_MODEL
        value: gemini-2.5-flash

      # ---- Transcription (Live Capture). No HF token -> falls back to OpenAI Whisper ----
      - key: TRANSCRIBE_PROVIDER
        value: huggingface
      - key: HF_ASR_MODEL
        value: openai/whisper-large-v3
      - key: OPENAI_ASR_MODEL
        value: whisper-1

      # ---- API keys (secret; set in dashboard) ----
      - key: GEMINI_API_KEY
        sync: false
      - key: CLAUDE_API_KEY
        sync: false
      - key: COMPANY_EMAIL
        sync: false
      - key: COMPANY_WEBSITE
        sync: false
      # SMTP — only needed for "Forgot password" OTP emails
      - key: SMTP_USER
        sync: false
      - key: SMTP_APP_PASSWORD
        sync: false

      # ---- Zoho: data center + WorkDrive + Meetings + Flowchart library ----
      - key: ZOHO_DC
        value: com
      - key: ZOHO_MEETINGS_ENABLED        # live Meeting Intelligence dashboard
        value: "true"
      - key: ZOHO_MEETINGS_ZSOID
        value: "776972991"
      - key: ZOHO_FLOWCHART_FOLDER_ID     # Process Architect flowchart style library
        value: q1kaa6e8fc7f4a4204923984a9a6e05fd0414
      # Secrets (set in dashboard):
      - key: ZOHO_CLIENT_ID
        sync: false
      - key: ZOHO_CLIENT_SECRET
        sync: false
      - key: ZOHO_REFRESH_TOKEN
        sync: false
      - key: ZOHO_WORKDRIVE_FOLDER_ID
        sync: false
