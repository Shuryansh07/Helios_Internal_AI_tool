<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot password — Helios Tech Labs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='theme.css') }}">
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='heliosBurst.svg') }}">
</head>
<body>
<div class="bg-atmosphere"></div>

<div class="auth-wrap">
  <div class="auth-card glass">
    <div class="auth-brand">
      <div class="logo-mark" style="width:56px;height:56px">
        <div class="star"><svg viewBox="0 0 100 100"><path d="M50 0L55 35L90 35L60 55L75 90L50 70L25 90L40 55L10 35L45 35Z"></path></svg></div>
        <div class="core"><i style="width:14px;height:14px"></i></div>
      </div>
      <h1>Forgot password</h1>
      <div class="sub">Enter your account email — we'll send a 6-digit OTP.</div>
    </div>

    {% if error %}<div class="auth-error">{{ error }}</div>{% endif %}

    <form method="post" action="{{ url_for('forgot') }}">
      <div>
        <label class="mono" for="email">Email</label>
        <input type="email" id="email" name="email" autocomplete="email" placeholder="name@company.com" required autofocus>
      </div>
      <button class="btn btn-grad" type="submit">Send OTP</button>
    </form>

    <div class="auth-links">
      <a href="{{ url_for('login') }}">← Back to sign in</a>
    </div>
  </div>
</div>
</body>
</html>
