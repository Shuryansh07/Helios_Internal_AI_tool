<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset password — Helios Tech Labs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='theme.css') }}">
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='heliosBurst.svg') }}">
</head>
<body>
<div class="bg-atmosphere"></div>

<div class="auth-wrap">
  <div class="auth-card glass">
    <div class="auth-brand">
      <div class="logo-mark" style="width:56px;height:56px">
        <div class="star"><svg viewBox="0 0 100 100"><path d="M50 0L55 35L90 35L60 55L75 90L50 70L25 90L40 55L10 35L45 35Z"></path></svg></div>
        <div class="core"><i style="width:14px;height:14px"></i></div>
      </div>
      <h1>Reset password</h1>
      <div class="sub">We sent an OTP to <b>{{ email }}</b>.</div>
    </div>

    {% if error %}<div class="auth-error">{{ error }}</div>{% endif %}
    {% if notice %}<div class="auth-notice">{{ notice }}</div>{% endif %}

    <form method="post" action="{{ url_for('reset') }}">
      <input type="hidden" name="email" value="{{ email }}">
      <div>
        <label class="mono" for="otp">6-digit OTP</label>
        <input type="text" id="otp" name="otp" inputmode="numeric" pattern="\d{6}" maxlength="6" autocomplete="one-time-code" required autofocus>
      </div>
      <div>
        <label class="mono" for="password">New password</label>
        <input type="password" id="password" name="password" minlength="8" autocomplete="new-password" required>
      </div>
      <div>
        <label class="mono" for="password2">Confirm new password</label>
        <input type="password" id="password2" name="password2" minlength="8" autocomplete="new-password" required>
      </div>
      <button class="btn btn-grad" type="submit">Update password</button>
    </form>

    <div class="auth-links">
      <a href="{{ url_for('forgot') }}">Resend</a>
      <span class="muted">·</span>
      <a href="{{ url_for('login') }}">Back to sign in</a>
    </div>
  </div>
</div>
</body>
</html>
